name: Signoffapp
options:
  bundleIdPrefix: com.shimondeitel.signoffapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Signoffapp:
    type: application
    platform: iOS
    sources:
      - path: Signoffapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.signoffapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Signoffapp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SignoffappTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SignoffappTests
      - path: Signoffapp.storekit
    dependencies:
      - target: Signoffapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.signoffapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SignoffappUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SignoffappUITests
    dependencies:
      - target: Signoffapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.signoffapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Signoffapp:
    build:
      targets:
        Signoffapp: all
        SignoffappTests: [test]
        SignoffappUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Signoffapp.storekit
    test:
      config: Debug
      storeKitConfiguration: Signoffapp.storekit
      targets:
        - SignoffappTests
        - SignoffappUITests
    archive:
      config: Release
